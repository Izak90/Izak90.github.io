    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-primary);
            line-height: var(--line-height-normal);
            color: var(--color-text-primary);
            background-color: var(--color-background-primary);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--color-primary-main) 0%, var(--color-primary-light) 100%);
            color: var(--color-text-inverse);
            padding: var(--spacing-xl) var(--spacing-lg);
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .header h1 {
            font-size: var(--font-size-4xl);
            margin-bottom: var(--spacing-sm);
            font-weight: var(--font-weight-bold);
        }

        .header p {
            font-size: var(--font-size-lg);
            opacity: 0.95;
        }

        /* Navigation */
        .nav {
            background-color: var(--color-background-secondary);
            padding: var(--spacing-md) var(--spacing-lg);
            display: flex;
            gap: var(--spacing-lg);
            justify-content: center;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav button {
            padding: var(--spacing-sm) var(--spacing-md);
            border: none;
            background-color: transparent;
            color: var(--color-primary-main);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .nav button:hover,
        .nav button.active {
            color: var(--color-secondary-main);
            border-bottom-color: var(--color-secondary-main);
            background-color: rgba(78, 205, 196, 0.05);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        /* Sections */
        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: var(--font-size-3xl);
            margin-bottom: var(--spacing-lg);
            color: var(--color-primary-main);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 40px;
            background: var(--color-secondary-main);
            border-radius: var(--radius-sm);
        }

        /* Grid de Exercícios */
        .exercises-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .exercise-card {
            background: var(--color-background-secondary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-card);
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .section:nth-child(1) .exercise-card {
            border-left-color: var(--color-accent-blue);
        }

        .section:nth-child(2) .exercise-card {
            border-left-color: var(--color-secondary-main);
        }

        .section:nth-child(3) .exercise-card {
            border-left-color: var(--color-accent-purple);
        }

        .exercise-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-5px);
        }

        .exercise-card h3 {
            color: var(--color-primary-main);
            margin-bottom: var(--spacing-sm);
            font-size: var(--font-size-lg);
        }

        .exercise-card p {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
            line-height: var(--line-height-relaxed);
        }

        /* Search */
        .search-box {
            margin-bottom: var(--spacing-lg);
            display: flex;
            gap: var(--spacing-sm);
        }

        .search-box input {
            flex: 1;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid var(--color-background-tertiary);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-base);
            transition: border-color 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-secondary-main);
            background-color: var(--color-background-secondary);
        }

        .search-box button {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: var(--color-primary-main);
            color: var(--color-text-inverse);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .search-box button:hover {
            background: var(--color-primary-light);
        }

        /* Footer */
        .footer {
            background-color: var(--color-primary-main);
            color: var(--color-text-inverse);
            text-align: center;
            padding: var(--spacing-lg);
            margin-top: var(--spacing-xl);
        }

        .footer p {
            margin: var(--spacing-xs) 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: var(--font-size-2xl);
            }

            .nav {
                flex-direction: column;
                gap: var(--spacing-sm);
            }

            .exercises-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: var(--spacing-md);
            }

            .section-title {
                font-size: var(--font-size-2xl);
            }
        }

        /* Stats */
        .stats {
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.1) 0%, rgba(69, 183, 209, 0.1) 100%);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            display: flex;
            gap: var(--spacing-lg);
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-secondary-main);
        }

        .stat-label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-top: var(--spacing-xs);
        }
    </style>
</head>

                    descricao: "Ajoelhe-se de frente para um sofá/parede. Apoie o pé esquerdo no sofá atrás de si e empurre a anca para a frente."
                },
                {
                    nome: "Couch Stretch Right",
                    descricao: "Igual, mas com o pé direito apoiado atrás."
                },
                {
                    nome: "Deep Squat Hold",
                    descricao: "Agache-se profundamente, mantendo os calcanhares no chão e as costas direitas. Permaneça na posição."
                },
                {
                    nome: "Pigeon Left",
                    descricao: "Partindo da prancha, traga o joelho esquerdo para a frente, apoiando a perna dobrada no chão, e incline-se para a frente."
                },
                {
                    nome: "Pigeon Right",
                    descricao: "Igual, mas com a perna direita dobrada à frente."
                },
                {
                    nome: "Relaxation Pose",
                    descricao: "Deite-se de costas com os braços e pernas ligeiramente afastados, relaxando completamente o corpo."
                }
            ]
        };

        // Renderizar Exercícios
        function renderizarExercicios() {
            Object.keys(exercicios).forEach(categoria => {
                const grid = document.getElementById(`grid-${categoria}`);
                const count = document.getElementById(`count-${categoria}`);
                
                grid.innerHTML = '';
                exercicios[categoria].forEach(exercicio => {
                    const card = document.createElement('div');
                    card.className = 'exercise-card';
                    card.innerHTML = `
                        <h3>${exercicio.nome}</h3>
                        <p>${exercicio.descricao}</p>
                    `;
                    grid.appendChild(card);
                });

                count.textContent = exercicios[categoria].length;
            });
        }

        // Navegação de Abas
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const section = this.getAttribute('data-section');
                
                // Remove active de todos
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                
                // Adiciona active ao clicado
                this.classList.add('active');
                document.getElementById(section).classList.add('active');
            });
        });

        // Buscar Exercício
        function buscarExercicio() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            
            if (!termo) {
                renderizarExercicios();
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelector('.nav-btn').classList.add('active');
                document.querySelector('.section').classList.add('active');
                return;
            }

            Object.keys(exercicios).forEach(categoria => {
                const grid = document.getElementById(`grid-${categoria}`);
                grid.innerHTML = '';

                const exerciciosFiltrados = exercicios[categoria].filter(ex => 
                    ex.nome.toLowerCase().includes(termo) || 
                    ex.descricao.toLowerCase().includes(termo)
                );

                exerciciosFiltrados.forEach(exercicio => {
                    const card = document.createElement('div');
                    card.className = 'exercise-card';
                    card.innerHTML = `
                        <h3>${exercicio.nome}</h3>
                        <p>${exercicio.descricao}</p>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', renderizarExercicios);
        document.getElementById('searchInput').addEventListener('keyup', buscarExercicio);
    </script>
</body>
</html>
