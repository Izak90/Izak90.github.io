<!-- TEMPLATE BASE PARA PÁGINAS INTERNAS -->
<!-- Este arquivo serve como referência para o CSS comum -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isaac Treinos Ar Livre</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== DESIGN SYSTEM - Natural & Outdoor ===== */
        :root {
            --color-primary: #2A9D8F;
            --color-primary-dark: #264653;
            --color-primary-light: #3DB5A5;
            --color-accent: #E76F51;
            --color-accent-dark: #D55E44;
            --color-accent-light: #F4A261;
            --color-white: #FFFFFF;
            --color-gray-50: #F8F9FA;
            --color-gray-100: #E9ECEF;
            --color-gray-200: #DEE2E6;
            --color-gray-300: #CED4DA;
            --color-gray-700: #495057;
            --color-gray-900: #212529;
            
            --font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 3rem;
            --space-2xl: 4rem;
            --space-3xl: 6rem;
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            
            --shadow-sm: 0 2px 8px rgba(42, 157, 143, 0.08);
            --shadow-md: 0 4px 16px rgba(42, 157, 143, 0.12);
            --shadow-lg: 0 8px 32px rgba(42, 157, 143, 0.16);
            
            --gradient-primary: linear-gradient(135deg, #2A9D8F 0%, #264653 100%);
            --gradient-accent: linear-gradient(135deg, #E76F51 0%, #F4A261 100%);
        }
        
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--font-family);
            line-height: 1.5;
            color: var(--color-gray-900);
            background: var(--color-white);
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }
        
        /* HEADER INTERNO */
        .internal-header {
            background: var(--color-white);
            padding: var(--space-md) 0;
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-2xl);
        }
        
        .internal-header__content {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            color: var(--color-primary);
            font-weight: 600;
            text-decoration: none;
            padding: var(--space-xs) var(--space-md);
            border-radius: var(--radius-full);
            transition: all 0.2s;
        }
        
        .back-link:hover {
            background: var(--color-gray-50);
            transform: translateX(-4px);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-xs);
            padding: var(--space-md) var(--space-xl);
            font-weight: 500;
            border-radius: var(--radius-full);
            transition: all 0.3s;
            min-height: 48px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            color: var(--color-white);
            box-shadow: var(--shadow-md);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        /* WHATSAPP FLOAT */
        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 999;
        }
        
        .whatsapp-float__btn {
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4); }
            50% { box-shadow: 0 4px 24px rgba(37, 211, 102, 0.7); }
        }
    </style>
</head>
<body>
    <!-- Usar este template como base -->
</body>
</html>
