<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal trainer - Treino funcional ao ar livre">
    <title>Isaac Lopes · Frente Cartão</title>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../assets/css/design-tokens.css">
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components/button.css">
    <link rel="stylesheet" href="../assets/css/components/badge.css">
    <link rel="stylesheet" href="../assets/css/components/card.css">
    <link rel="stylesheet" href="../assets/css/components/header.css">
    <link rel="stylesheet" href="../assets/css/utilities.css">
    
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--color-background-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            font-family: var(--font-family-primary);
        }

        /* CARTÃO CR80 - DESIGN MINIMALISTA */
        .cartao-minimal {
            width: 324px;        /* 85,6mm */
            height: 204px;       /* 54mm */
            background: var(--color-background-secondary);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid rgba(17, 57, 70, 0.1);
        }

        /* Barra lateral (assinatura visual) */
        .barra-lateral {
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, var(--color-secondary-main), var(--color-primary-light));
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .conteudo {
            position: relative;
            height: 100%;
            padding: 22px 20px 18px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* NOME - grande e imponente */
        .nome-container {
            margin-bottom: var(--spacing-sm);
        }

        .nome {
            font-size: 1.8rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-primary-main);
            letter-spacing: -0.5px;
            line-height: var(--line-height-tight);
            margin-bottom: 2px;
        }

        .titulo-profissional {
            font-size: 0.7rem;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .divisor-nome {
            width: 40px;
            height: 3px;
            background: var(--color-secondary-main);
            border-radius: 4px;
            margin: 4px 0 8px;
        }

        /* ÁREA PRINCIPAL com duas colunas */
        .area-principal {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Coluna esquerda - info */
        .info-container {
            flex: 2;
        }

        .linha-info {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 7px;
        }

        .marcador {
            color: var(--color-primary-light);
            min-width: 20px;
            width: 16px;
            height: 16px;
            display: inline-block;
            stroke-width: 2;
        }

        .texto-info {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            line-height: 1.3;
        }

        .texto-info strong {
            color: var(--color-primary-main);
            font-weight: var(--font-weight-bold);
        }

        .destaque-local {
            background: rgba(78, 205, 196, 0.1);
            padding: 4px 12px 4px 4px;
            border-radius: var(--radius-full);
            border-left: 3px solid var(--color-secondary-main);
            font-weight: var(--font-weight-semibold);
        }

        /* Coluna direita - QR code minimalista */
        .qr-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-simples {
            background: var(--color-background-secondary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(17, 57, 70, 0.1);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-simples img {
            width: 76px;
            height: 76px;
            border-radius: var(--radius-md);
            display: block;
        }

        .qr-label {
            font-size: 0.5rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-text-secondary);
            margin-top: 4px;
            text-align: center;
            letter-spacing: 0;
        }

        .handle-mini {
            font-size: 0.58rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-primary-main);
            margin-top: 2px;
            letter-spacing: -0.2px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="cartao-minimal">
        <!-- Barra lateral verde (assinatura) -->
        <div class="barra-lateral"></div>

        <div class="conteudo">
            <!-- NOME principal -->
            <div class="nome-container">
                <div class="nome">ISAAC LOPES</div>
                <div class="titulo-profissional">Personal Trainer & Coach</div>
                <div class="divisor-nome"></div>
            </div>

            <!-- ÁREA PRINCIPAL com duas colunas -->
            <div class="area-principal">
                <!-- Coluna esquerda: informações -->
                <div class="info-container">
                    <div class="linha-info">
                        <i data-lucide="trees" class="marcador"></i>
                        <span class="texto-info"><strong>Treinos Ar livre</strong></span>
                    </div>
                    <div class="linha-info">
                        <i data-lucide="map-pin" class="marcador"></i>
                        <span class="texto-info"><strong>Parque Naide Gomes Odivelas</strong></span>
                    </div>
                    <div class="linha-info">
                        <i data-lucide="phone" class="marcador"></i>
                        <span class="texto-info"><strong>+351 939 481 840</strong></span>
                    </div>
                </div>

                <!-- Coluna direita: QR code -->
                <div class="qr-container">
                    <div class="qr-simples">
                        <img src="qrcode.png" alt="QR Code Instagram">
                    </div>
                    <div class="qr-label">Segue-me no Instagram</div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/main.js"></script>
    <script>
        // Inicializar ícones Lucide quando disponível
        window.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
