<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal trainer - Treino funcional ao ar livre">
    <title>Isaac Lopes · Frente Cartão</title>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../assets/css/design-tokens.css">
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components/button.css">
    <link rel="stylesheet" href="../assets/css/components/badge.css">
    <link rel="stylesheet" href="../assets/css/components/card.css">
    <link rel="stylesheet" href="../assets/css/components/header.css">
    <link rel="stylesheet" href="../assets/css/utilities.css">
    
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            #background: #1e3f2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* CARTÃO CR80 - DESIGN MINIMALISTA */
        .cartao-minimal {
            width: 324px;        /* 85,6mm */
            height: 204px;       /* 54mm */
            background: #faf9f2;  /* fundo cru / off-white elegante */
            #border-radius: 16px;
            box-shadow: 
                0 20px 30px -12px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(180, 160, 120, 0.2) inset;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        /* Barra lateral verde (assinatura visual) */
        .barra-lateral {
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, #3f7840, #28532a);
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .conteudo {
            position: relative;
            height: 100%;
            padding: 22px 20px 18px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* NOME - grande e imponente */
        .nome-container {
            margin-bottom: 8px;
        }

        .nome {
            font-size: 2rem;
            font-weight: 700;
            color: #1e3a1e;
            letter-spacing: -0.5px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .divisor-nome {
            width: 40px;
            height: 3px;
            background: #dcb457;
            border-radius: 4px;
            margin: 6px 0 8px;
        }

        /* ÁREA PRINCIPAL com duas colunas */
        .area-principal {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0 4px;
        }

        /* Coluna esquerda - info */
        .info-container {
            flex: 2;
        }

        .linha-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .marcador {
            font-size: 1.2rem;
            color: #527a4c;
            min-width: 24px;
        }

        .texto-info {
            font-size: 0.8rem;
            font-weight: 500;
            color: #2a462a;
            line-height: 1.3;
        }

        .texto-info strong {
            color: #3f703f;
            font-weight: 700;
        }

        .destaque-local {
            background: rgba(220, 180, 87, 0.1);
            padding: 4px 12px 4px 4px;
            border-radius: 30px;
            border-left: 3px solid #dcb457;
            font-weight: 600;
        }

        /* Coluna direita - QR code minimalista */
        .qr-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-simples {
            background: white;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 5px 12px -5px rgba(0,0,0,0.2);
            border: 1px solid #e0d9c0;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-simples img {
            width: 76px;
            height: 76px;
			border-radius: 16px;
            display: block;
        }

        .handle-mini {
            font-size: 0.55rem;
            font-weight: 600;
            color: #3b5e3b;
            margin-top: 6px;
            letter-spacing: -0.2px;
            background: #f0f3e5;
            padding: 3px 8px;
            #border-radius: 30px;
            border: 1px solid #d1dbbc;
        }

        /* Cantos suaves */
        .cartao-minimal {
            #border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="cartao-minimal">
        <!-- Barra lateral verde (assinatura) -->
        <div class="barra-lateral"></div>

        <div class="conteudo">
            <!-- NOME principal -->
            <div class="nome-container">
                <div class="nome">ISAAC LOPES</div>
                <div class="divisor-nome"></div>
            </div>

            <!-- ÁREA PRINCIPAL com duas colunas -->
            <div class="area-principal">
                <!-- Coluna esquerda: informações -->
                <div class="info-container">
                    <div class="linha-info">
                        <span class="marcador">🌳</span>
                        <span class="texto-info"><strong>Treinos Ar livre</strong></span>
                    </div>
                    <div class="linha-info">
                        <span class="marcador">📍</span>
                        <span class="texto-info"><strong>Parque Naide Gomes · Odivelas</strong></span>
                    </div>
                </div>

                <!-- Coluna direita: QR code -->
                <div class="qr-container">
                    <div class="qr-simples">
                        <img src="qrcode.png" alt="QR Code Instagram">
                    </div>
                    <span class="handle-mini">@isaac_treinos_ar_livre</span>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/main.js"></script>
</body>
</html>
