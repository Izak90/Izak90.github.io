<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal trainer - Treino funcional ao ar livre">
    <title>Isaac Lopes · Verso Cartão</title>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../assets/css/design-tokens.css">
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components/button.css">
    <link rel="stylesheet" href="../assets/css/components/badge.css">
    <link rel="stylesheet" href="../assets/css/components/card.css">
    <link rel="stylesheet" href="../assets/css/components/header.css">
    <link rel="stylesheet" href="../assets/css/utilities.css">
    
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            #background: #1e3f2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* MESMO ESTILO DA FRENTE */
        .cartao-verso {
            width: 324px;        /* 85,6mm */
            height: 204px;       /* 54mm */
            background: #faf9f2;
            #border-radius: 16px;
            box-shadow: 
                0 20px 30px -12px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(180, 160, 120, 0.2) inset;
            position: relative;
            overflow: hidden;
        }

        /* Barra lateral verde (mesma identidade) */
        .barra-lateral {
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, #3f7840, #28532a);
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .conteudo-verso {
            position: relative;
            height: 100%;
            padding: 24px 20px 20px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Título principal do verso */
        .titulo-principal {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e3a1e;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .subtitulo {
            font-size: 0.8rem;
            color: #5d7355;
            font-weight: 500;
            margin-bottom: 16px;
            border-left: 3px solid #dcb457;
            padding-left: 10px;
        }

		/* CTA principal */
        .cta-verso {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(220, 180, 87, 0.08);
            border-radius: 50px;
            padding: 10px 16px;
            border: 1px solid #e7d7aa;
        }

        .cta-verso-esquerda {
            display: flex;
            align-items: center;
            gap: 8px;
        }
		
		.cta-emoji {
            font-size: 1.3rem;
        }

        .cta-texto {
            font-size: 0.8rem;
            font-weight: 700;
            color: #2e5e2e;
        }

        .cta-texto-small {
            font-size: 0.65rem;
            color: #617a55;
            font-weight: 500;
        }

    </style>
</head>
<body>
    <div class="cartao-verso">
        <!-- Barra lateral verde (identidade visual) -->
        <div class="barra-lateral"></div>

        <div class="conteudo-verso">
            <!-- Cabeçalho do verso -->
            <div>
                <div class="titulo-principal">CALISTENIA · FUNCIONAL</div>
                <div class="subtitulo">treinos adaptados · todos os níveis · presencial e online</div>
            </div>
			
			<div class="cta-verso">
                <div class="cta-verso-esquerda">
                    <div class="cta-emoji">🎁</div>
                    <div>
                        <div class="cta-texto">1ª AULA GRATUITA</div>
                        <div class="cta-texto-small">vem experimentar · sem compromisso</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/main.js"></script>
</body>
</html>
