<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal trainer - Treino funcional ao ar livre">
    <title>Isaac Lopes · Verso Cartão</title>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../assets/css/design-tokens.css">
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components/button.css">
    <link rel="stylesheet" href="../assets/css/components/badge.css">
    <link rel="stylesheet" href="../assets/css/components/card.css">
    <link rel="stylesheet" href="../assets/css/components/header.css">
    <link rel="stylesheet" href="../assets/css/utilities.css">
    
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--color-background-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            font-family: var(--font-family-primary);
        }

        /* MESMO ESTILO DA FRENTE */
        .cartao-verso {
            width: 324px;        /* 85,6mm */
            height: 204px;       /* 54mm */
            background: var(--color-background-secondary);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(17, 57, 70, 0.1);
        }

        /* Barra lateral (mesma identidade) */
        .barra-lateral {
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, var(--color-secondary-main), var(--color-primary-light));
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .conteudo-verso {
            position: relative;
            height: 100%;
            padding: 20px 20px 18px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Título principal do verso */
        .titulo-principal {
            font-size: 1rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-primary-main);
            letter-spacing: -0.3px;
            margin-bottom: 3px;
        }

        .subtitulo {
            font-size: 0.7rem;
            color: var(--color-text-secondary);
            font-weight: var(--font-weight-medium);
            margin-bottom: var(--spacing-md);
            border-left: 3px solid var(--color-secondary-main);
            padding-left: var(--spacing-sm);
        }

        /* Seção de contatos */
        .contatos-verso {
            margin-bottom: var(--spacing-md);
        }

        .contato-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: 7px;
        }

        .contato-icon {
            width: 16px;
            height: 16px;
            color: var(--color-primary-light);
            display: inline-block;
            stroke-width: 2;
        }

        .contato-texto {
            font-size: 0.7rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        .contato-label {
            font-size: 0.6rem;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }

		/* CTA principal */
        .cta-verso {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(78, 205, 196, 0.1);
            border-radius: var(--radius-full);
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .cta-verso-esquerda {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
		
		.cta-emoji {
            width: 22px;
            height: 22px;
            color: var(--color-secondary-main);
            display: inline-block;
            stroke-width: 2;
        }

        .cta-texto {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-bold);
            color: var(--color-primary-main);
        }

        .cta-texto-small {
            font-size: 0.65rem;
            color: var(--color-text-secondary);
            font-weight: var(--font-weight-medium);
        }

    </style>
</head>
<body>
    <div class="cartao-verso">
        <!-- Barra lateral verde (identidade visual) -->
        <div class="barra-lateral"></div>

        <div class="conteudo-verso">
            <!-- Cabeçalho do verso -->
            <div>
                <div class="titulo-principal">CALISTENIA & FUNCIONAL</div>
                <div class="subtitulo">treinos ao ar livre · presencial e online</div>
            </div>

            <!-- Contatos -->
            <div class="contatos-verso">
                <div class="contato-item">
                    <i data-lucide="link" class="contato-icon"></i>
                    <div>
                        <div class="contato-label">Website</div>
                        <div class="contato-texto" style="font-size: 0.6rem;">izak90.github.io/isaac_treinos_ar_livre</div>
                    </div>
                </div>
            </div>
			
			<div class="cta-verso">
                <div class="cta-verso-esquerda">
                    <i data-lucide="gift" class="cta-emoji"></i>
                    <div>
                        <div class="cta-texto">1ª AULA GRATUITA</div>
                        <div class="cta-texto-small">experimenta sem compromisso</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/main.js"></script>
    <script>
        // Inicializar ícones Lucide quando disponível
        window.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
