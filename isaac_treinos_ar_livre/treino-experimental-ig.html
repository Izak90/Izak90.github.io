<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Treino Experimental - Isaac Lopes</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary-main: #113946;
            --color-primary-dark: #0a2530;
            --color-secondary-main: #4ecdc4;
            --color-accent-blue: #45b7d1;
            --color-text-inverse: #ffffff;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-primary-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 3 / 4;
            background: linear-gradient(135deg, rgba(17, 57, 70, 0.42) 0%, rgba(10, 37, 48, 0.45) 100%),
                        url('./img/Foto-Hero-IG.jpg') center/cover no-repeat;
            background-size: cover;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.2) 0%, transparent 30%, transparent 70%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* --- LOGO CORRIGIDO: alinhamento vertical perfeito entre ícone e texto --- */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: 700;
            color: var(--color-secondary-main);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-transform: uppercase;
            gap: 0;
            flex-wrap: nowrap;
        }

        .logo-icon {
            display: block;           /* Melhor controle no flex */
            width: 56px;
            height: 56px;
            margin-right: 15px;
            background: url('./img/logo-black.png') center/contain no-repeat;
            flex-shrink: 0;          /* Evita que o ícone encolha */
        }

        /* O texto "ISAAC LOPES" mantém-se como conteúdo textual dentro do flex,
           garantindo centralização vertical perfeita devido ao align-items: center */
        
        .title {
            font-size: 26px;
            font-weight: 700;
            color: var(--color-text-inverse);
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .middle {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .event-title {
            font-size: 52px;
            font-weight: 700;
            color: var(--color-text-inverse);
            line-height: 1.1;
            margin-bottom: 18px;
            letter-spacing: 1px;
            text-shadow: 2px 4px 12px rgba(0, 0, 0, 0.3);
        }

        .event-details {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
        }

        .cta-button {
            display: inline-block;
            background: var(--color-secondary-main);
            color: var(--color-primary-main);
            padding: 16px 32px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(78, 205, 196, 0.3);
            cursor: pointer;
            border: none;
            border-radius: 50px;
        }

        .cta-button:hover {
            background: var(--color-accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(69, 183, 209, 0.4);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* Responsividade ajustada para manter legibilidade */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 22px;
            }
            
            .logo {
                font-size: 22px;       /* texto ligeiramente menor em mobile */
            }
            
            .logo-icon {
                width: 48px;
                height: 48px;
                margin-right: 12px;
            }

            .event-title {
                font-size: 44px;
            }

            .event-details {
                font-size: 12px;
            }

            .cta-button {
                padding: 14px 28px;
                font-size: 11px;
            }
        }
        
        /* Pequeno ajuste para telas muito estreitas (ex: 380px) evitar quebra feia */
        @media (max-width: 450px) {
            .logo {
                font-size: 20px;
                letter-spacing: 1px;
            }
            .logo-icon {
                width: 44px;
                height: 44px;
                margin-right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="header">
                <!-- Logo com flex + centralização vertical correta -->
                <div class="logo">
                    <span class="logo-icon" aria-label="Logótipo Isaac Lopes"></span>
                    ISAAC LOPES
                </div>
                <div class="title">Calistenia & Treino Funcional</div>
                <div class="subtitle">Domina o teu corpo. Supera os teus limites.</div>
            </div>

            <div class="middle">
                <div class="event-title">TREINO<br>EXPERIMENTAL</div>
                <div class="event-details">SÁBADO, 06 JUN • 9H30 • PARQUE NAIDE GOMES</div>
            </div>

            <div class="footer">
                <button class="cta-button">GRATUITO • VAGAS LIMITADAS • INSCREVE-TE JÁ!</button>
            </div>
        </div>
        <!-- Nota: elemento extra 'nav-arrow' removido para não interferir no layout -->
    </div>
</body>
</html>
