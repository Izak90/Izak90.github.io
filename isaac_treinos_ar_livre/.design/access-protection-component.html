<!-- SISTEMA DE PROTEÇÃO DE ACESSO PARA PÁGINAS DE TREINO -->
<!-- Adicionar no início do <body>, antes do conteúdo principal -->

<style>
.access-protection {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #2A9D8F 0%, #264653 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 1.5rem;
}

.access-protection.hidden {
    display: none;
}

.access-card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    text-align: center;
    position: relative;
}

.access-card__close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: transparent;
    border: none;
    color: #495057;
    font-size: 1.5rem;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
}

.access-card__close:hover {
    background: #E9ECEF;
    color: #264653;
}

.access-card__icon {
    font-size: 4rem;
    margin-bottom: 1rem;
}

.access-card__title {
    color: #264653;
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
}

.access-card__subtitle {
    color: #495057;
    margin-bottom: 2rem;
    font-size: 1rem;
}

.access-card__input {
    width: 100%;
    padding: 1rem 1.5rem;
    border: 2px solid #E9ECEF;
    border-radius: 12px;
    font-size: 1rem;
    text-align: center;
    margin-bottom: 1rem;
    font-family: inherit;
    transition: all 0.2s;
}

.access-card__input:focus {
    outline: none;
    border-color: #2A9D8F;
    box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.1);
}

.access-card__button {
    width: 100%;
    padding: 1rem 2rem;
    background: linear-gradient(135deg, #2A9D8F 0%, #264653 100%);
    color: white;
    border: none;
    border-radius: 9999px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
}

.access-card__button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(42, 157, 143, 0.3);
}

.access-card__error {
    color: #E76F51;
    font-size: 0.875rem;
    margin-top: 0.5rem;
    display: none;
}

.access-card__error.show {
    display: block;
}

.access-card__help {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #E9ECEF;
    color: #495057;
    font-size: 0.875rem;
}

.access-card__help a {
    color: #2A9D8F;
    text-decoration: none;
    font-weight: 600;
}

.access-card__help a svg {
    width: 14px;
    height: 14px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 4px;
    fill: currentColor;
}
</style>

<div class="access-protection" id="accessProtection">
    <div class="access-card">
        <button class="access-card__close" onclick="closeAccessCard()" aria-label="Fechar">×</button>
        <div class="access-card__icon">
            <i data-lucide="users"></i>
        </div>
        <h2 class="access-card__title">Turma Fundadora</h2>
        <p class="access-card__subtitle">Área exclusiva para membros da comunidade</p>
        
        <input 
            type="password" 
            class="access-card__input" 
            id="accessCode" 
            placeholder="Código de Acesso"
            autocomplete="off"
        >
        
        <button class="access-card__button" onclick="checkAccess()">
            Acessar
        </button>
        
        <p class="access-card__error" id="accessError">❌ Código incorreto. Tenta novamente.</p>
        
        <div class="access-card__help">
            <p>Não tens o código?</p>
            <a href="https://wa.me/351939481840" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

                </svg>
                Solicitar no WhatsApp
            </a>
        </div>
    </div>
</div>

<script>
// Código de acesso (alterar conforme necessário)
const ACCESS_CODE = '';

// Fechar caixa de acesso
function closeAccessCard() {
    document.getElementById('accessProtection').classList.add('hidden');
}

// Verificar código
function checkAccess() {
    const input = document.getElementById('accessCode');
    const error = document.getElementById('accessError');
    const protection = document.getElementById('accessProtection');
    
    if (input.value.toUpperCase() === ACCESS_CODE) {
        // Salvar acesso no sessionStorage
        sessionStorage.setItem('hasAccess', 'true');
        
        // Esconder proteção
        protection.classList.add('hidden');
        error.classList.remove('show');
    } else {
        // Mostrar erro
        error.classList.add('show');
        input.value = '';
        input.focus();
    }
}

// Permitir Enter para submeter
document.getElementById('accessCode').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        checkAccess();
    }
});

// Verificar se já tem acesso
window.addEventListener('DOMContentLoaded', function() {
    if (sessionStorage.getItem('hasAccess') === 'true') {
        document.getElementById('accessProtection').classList.add('hidden');
    } else {
        // Focar no input automaticamente
        setTimeout(() => {
            document.getElementById('accessCode').focus();
        }, 300);
    }
});
</script>

<!-- INSTRUÇÕES:
1. Adicionar este bloco no início de cada página de treino (semanas/*.html)
2. Alterar a constante ACCESS_CODE para o código desejado
3. O código fica guardado na sessão (válido enquanto o browser estiver aberto)
4. Para códigos diferentes por semana, usar: ACCESS_CODE = 'SEMANA1', 'SEMANA2', etc.
5. O link WhatsApp permite solicitar o código diretamente
-->
