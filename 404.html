<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f2f7fc; color: #1e3b4f; padding: 18px 16px 32px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 560px; margin: 0 auto; text-align: center; }
        .card { background: white; border-radius: 36px; padding: 40px 22px; box-shadow: 0 12px 28px -12px #00375030; }
        h1 { font-size: 4rem; margin-bottom: 16px; }
        .btn { display: inline-block; margin-top: 24px; padding: 16px 32px; background: #1e4f6e; color: white; border-radius: 40px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>404</h1>
            <p style="font-size:1.4rem;">Página não encontrada</p>
            <p style="margin:20px 0;">O link que procuras pode estar errado ou a página foi movida.</p>
            <a href="index.html" class="btn">VOLTAR AO INÍCIO</a>
        </div>
    </div>
</body>
</html>
